name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      # No se corre `tsc --noEmit` aparte: en un proyecto Angular con templates
      # inline, `ng build` ya hace el type-check completo (incluyendo bindings
      # de plantillas) vía el compilador de Angular — un tsc plano por su cuenta
      # sería más débil y redundante.
      - run: npm run build

  deploy:
    name: Deploy to cPanel
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build

      # `ng build` genera tanto el bundle de navegador (browser/) como el
      # servidor SSR (server/server.mjs, usado por Passenger para las rutas
      # con RenderMode.Server/Prerender). Se sube dist/iglesia completo.
      - name: Subir build a cPanel (FTP)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}/
          local-dir: ./dist/iglesia/

      - name: Reiniciar la app (Passenger)
        run: |
          curl --ftp-create-dirs -T /dev/null \
            "ftp://${{ secrets.FTP_USERNAME }}:${{ secrets.FTP_PASSWORD }}@${{ secrets.FTP_SERVER }}${{ secrets.FTP_SERVER_DIR }}/tmp/restart.txt"
